<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1a1a2e" rx="20"/>
  <!-- Phone frame left -->
  <rect x="50" y="20" width="320" height="560" rx="30" fill="#16213e" stroke="#2a2a4e" stroke-width="2"/>
  <rect x="50" y="20" width="320" height="30" rx="30" fill="#0f3460"/>
  <circle cx="100" cy="35" r="4" fill="#e94560"/>
  <text x="210" y="40" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="10">ShadowSleuth</text>
  <circle cx="330" cy="35" r="4" fill="#4ecdc4"/>
  <!-- Scan button -->
  <rect x="70" y="55" width="280" height="100" rx="10" fill="#0f3460" opacity="0.5"/>
  <circle cx="210" cy="85" r="18" fill="none" stroke="#e94560" stroke-width="2"/>
  <line x1="210" y1="67" x2="210" y2="78" stroke="#e94560" stroke-width="2"/>
  <line x1="210" y1="92" x2="210" y2="103" stroke="#e94560" stroke-width="2"/>
  <line x1="192" y1="85" x2="200" y2="85" stroke="#e94560" stroke-width="2"/>
  <line x1="220" y1="85" x2="228" y2="85" stroke="#e94560" stroke-width="2"/>
  <text x="210" y="120" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="12" font-weight="bold">开始扫描</text>
  <text x="210" y="140" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="8">扫描全部照片 找出重复与相似</text>
  <!-- Results card 1 -->
  <rect x="70" y="170" width="280" height="50" rx="8" fill="#16213e" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="80" y="175" width="36" height="36" rx="4" fill="#e94560" opacity="0.3"/>
  <rect x="82" y="177" width="14" height="14" rx="2" fill="#e94560" opacity="0.6"/>
  <rect x="98" y="193" width="14" height="14" rx="2" fill="#e94560" opacity="0.6"/>
  <text x="128" y="189" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">文件名相同</text>
  <text x="128" y="202" fill="#606080" font-family="sans-serif" font-size="8">IMG_001.jpg · 3 张</text>
  <!-- Results card 2 -->
  <rect x="70" y="228" width="280" height="50" rx="8" fill="#16213e" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="80" y="233" width="36" height="36" rx="4" fill="#45b7d1" opacity="0.3"/>
  <rect x="82" y="235" width="14" height="14" rx="2" fill="#45b7d1" opacity="0.6"/>
  <rect x="98" y="251" width="14" height="14" rx="2" fill="#45b7d1" opacity="0.6"/>
  <text x="128" y="247" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">大小相同</text>
  <text x="128" y="260" fill="#606080" font-family="sans-serif" font-size="8">1.2 MB · 2 张</text>
  <!-- Results card 3 -->
  <rect x="70" y="286" width="280" height="50" rx="8" fill="#16213e" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="80" y="291" width="36" height="36" rx="4" fill="#4ecdc4" opacity="0.3"/>
  <rect x="82" y="293" width="14" height="14" rx="2" fill="#4ecdc4" opacity="0.6"/>
  <rect x="98" y="309" width="14" height="14" rx="2" fill="#4ecdc4" opacity="0.6"/>
  <text x="128" y="305" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">dHash 相似</text>
  <text x="128" y="318" fill="#606080" font-family="sans-serif" font-size="8">裁剪/压缩后仍可识别 · 5 张</text>
  <!-- Bottom nav -->
  <rect x="50" y="540" width="320" height="40" rx="0" fill="#0f3460"/>
  <text x="130" y="565" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="10" font-weight="bold">扫描</text>
  <text x="210" y="565" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="10">搜索</text>
  <text x="290" y="565" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="10">关于</text>
  <!-- Right phone -->
  <rect x="430" y="20" width="320" height="560" rx="30" fill="#16213e" stroke="#2a2a4e" stroke-width="2"/>
  <rect x="430" y="20" width="320" height="30" rx="30" fill="#0f3460"/>
  <text x="590" y="40" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="10">选择图片搜索</text>
  <!-- Sample image area -->
  <rect x="480" y="70" width="220" height="160" rx="12" fill="#0f3460"/>
  <rect x="530" y="120" width="120" height="60" rx="4" fill="#e94560" opacity="0.2"/>
  <text x="590" y="155" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="14" opacity="0.6">样本图片</text>
  <rect x="570" y="185" width="40" height="20" rx="10" fill="#4ecdc4" opacity="0.4"/>
  <text x="590" y="199" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="9">dHash</text>
  <!-- Search result 1 -->
  <rect x="450" y="250" width="280" height="45" rx="8" fill="#0f3460" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="458" y="255" width="32" height="32" rx="4" fill="#4ecdc4" opacity="0.3"/>
  <text x="502" y="268" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">dHash 相似 · 3 张</text>
  <text x="502" y="283" fill="#606080" font-family="sans-serif" font-size="7">汉明距离 ≤ 10</text>
  <!-- Search result 2 -->
  <rect x="450" y="303" width="280" height="45" rx="8" fill="#0f3460" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="458" y="308" width="32" height="32" rx="4" fill="#e94560" opacity="0.3"/>
  <text x="502" y="321" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">文件名相同 · 2 张</text>
  <text x="502" y="336" fill="#606080" font-family="sans-serif" font-size="7">IMG_2024.jpg</text>
  <!-- Search result 3 -->
  <rect x="450" y="356" width="280" height="45" rx="8" fill="#0f3460" stroke="#2a2a4e" stroke-width="1"/>
  <rect x="458" y="361" width="32" height="32" rx="4" fill="#45b7d1" opacity="0.3"/>
  <text x="502" y="374" fill="#b0b0c0" font-family="sans-serif" font-size="9" font-weight="bold">大小相同 · 2 张</text>
  <text x="502" y="389" fill="#606080" font-family="sans-serif" font-size="7">2.4 MB</text>
  <!-- Arrow between phones -->
  <text x="400" y="300" text-anchor="middle" fill="#b0b0c0" font-family="sans-serif" font-size="40" opacity="0.5">&#x203A;</text>
</svg>
